<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수학비서 AI 강의 후기 작성</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #7C3AED;
      --primary-dark: #6D28D9;
      --primary-light: #EDE9FE;
      --accent: #F59E0B;
      --dark: #111827;
      --gray-700: #374151;
      --gray-500: #6B7280;
      --gray-300: #D1D5DB;
      --gray-100: #F3F4F6;
      --white: #FFFFFF;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--gray-100);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    .card {
      background: var(--white);
      border-radius: 20px;
      max-width: 520px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
    }

    .card-header {
      background: linear-gradient(135deg, #7C3AED, #A855F7);
      padding: 32px 28px;
      text-align: center;
      color: var(--white);
    }

    .card-header p.emoji { font-size: 40px; margin-bottom: 8px; }
    .card-header h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .card-header p.sub { font-size: 14px; opacity: 0.8; }

    .card-body {
      padding: 32px 28px;
    }

    .form-group {
      margin-bottom: 22px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--gray-700);
    }

    .form-group label .required {
      color: #EF4444;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--gray-300);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .form-group textarea {
      height: 90px;
      resize: vertical;
    }

    /* Star Rating */
    .star-rating {
      display: flex;
      gap: 8px;
      flex-direction: row-reverse;
      justify-content: flex-end;
    }

    .star-rating input {
      display: none;
    }

    .star-rating label {
      font-size: 36px;
      color: var(--gray-300);
      cursor: pointer;
      transition: color 0.15s;
      margin-bottom: 0;
    }

    .star-rating input:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label {
      color: var(--accent);
    }

    /* NPS */
    .nps-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .nps-row input { display: none; }

    .nps-row label {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--gray-300);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 0;
    }

    .nps-row input:checked + label {
      background: var(--primary);
      color: var(--white);
      border-color: var(--primary);
    }

    .nps-row label:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .nps-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      font-size: 11px;
      color: var(--gray-500);
    }

    .incentive {
      background: #FEF3C7;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 24px;
      text-align: center;
      font-size: 13px;
      color: #92400E;
      font-weight: 500;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s;
    }

    .submit-btn:hover { background: var(--primary-dark); }
    .submit-btn:disabled { background: var(--gray-300); cursor: not-allowed; }

    /* Success State */
    .success-view {
      display: none;
      text-align: center;
      padding: 48px 28px;
    }

    .success-view.active { display: block; }
    .success-view .emoji { font-size: 56px; margin-bottom: 16px; }
    .success-view h2 { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
    .success-view p { font-size: 15px; color: var(--gray-500); line-height: 1.7; }

    .form-view.hidden { display: none; }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      <p class="emoji">&#9997;&#65039;</p>
      <h1>강의 후기 남기기</h1>
      <p class="sub">30초면 충분합니다!</p>
    </div>

    <!-- Form View -->
    <div class="card-body form-view" id="formView">
      <div class="incentive">
        &#127873; 후기 작성 시 다음 강의 실습 자료를 미리 보내드려요!
      </div>

      <form id="reviewForm" novalidate>
        <div class="form-group">
          <label>이름 <span class="required">*</span></label>
          <input type="text" name="name" placeholder="홍길동" required>
        </div>

        <div class="form-group">
          <label>이메일 <span class="required">*</span></label>
          <input type="email" name="email" placeholder="신청 시 입력한 이메일" required>
        </div>

        <div class="form-group">
          <label>강의 만족도 <span class="required">*</span></label>
          <div class="star-rating">
            <input type="radio" id="star5" name="rating" value="5">
            <label for="star5">&#9733;</label>
            <input type="radio" id="star4" name="rating" value="4">
            <label for="star4">&#9733;</label>
            <input type="radio" id="star3" name="rating" value="3">
            <label for="star3">&#9733;</label>
            <input type="radio" id="star2" name="rating" value="2">
            <label for="star2">&#9733;</label>
            <input type="radio" id="star1" name="rating" value="1">
            <label for="star1">&#9733;</label>
          </div>
        </div>

        <div class="form-group">
          <label>한줄평 <span class="required">*</span></label>
          <textarea name="comment" placeholder="이번 강의에 대한 소감을 자유롭게 남겨주세요." required></textarea>
        </div>

        <div class="form-group">
          <label>가장 좋았던 점 (선택)</label>
          <select name="bestPart">
            <option value="" selected>선택해주세요</option>
            <option value="practical">실습이 바로 적용 가능해서</option>
            <option value="easy">쉽게 설명해줘서</option>
            <option value="useful-tool">유용한 도구를 알게 되어서</option>
            <option value="qa">실시간 Q&A가 좋아서</option>
            <option value="networking">다른 강사님들과 교류할 수 있어서</option>
          </select>
        </div>

        <div class="form-group">
          <label>개선되면 좋겠는 점 (선택)</label>
          <textarea name="improvement" placeholder="더 나은 강의를 위한 의견이 있으시면 남겨주세요." style="height:70px;"></textarea>
        </div>

        <div class="form-group">
          <label>이 강의를 다른 강사님께 추천하시겠어요?</label>
          <div class="nps-row">
            <input type="radio" id="nps0" name="recommend" value="0"><label for="nps0">0</label>
            <input type="radio" id="nps1" name="recommend" value="1"><label for="nps1">1</label>
            <input type="radio" id="nps2" name="recommend" value="2"><label for="nps2">2</label>
            <input type="radio" id="nps3" name="recommend" value="3"><label for="nps3">3</label>
            <input type="radio" id="nps4" name="recommend" value="4"><label for="nps4">4</label>
            <input type="radio" id="nps5" name="recommend" value="5"><label for="nps5">5</label>
            <input type="radio" id="nps6" name="recommend" value="6"><label for="nps6">6</label>
            <input type="radio" id="nps7" name="recommend" value="7"><label for="nps7">7</label>
            <input type="radio" id="nps8" name="recommend" value="8"><label for="nps8">8</label>
            <input type="radio" id="nps9" name="recommend" value="9"><label for="nps9">9</label>
            <input type="radio" id="nps10" name="recommend" value="10"><label for="nps10">10</label>
          </div>
          <div class="nps-labels">
            <span>전혀 아니요</span>
            <span>매우 그렇습니다</span>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">후기 제출하기</button>
      </form>
    </div>

    <!-- Success View -->
    <div class="success-view" id="successView">
      <div class="emoji">&#127881;</div>
      <h2>감사합니다!</h2>
      <p>
        소중한 후기를 남겨주셔서 감사합니다.<br>
        다음 강의 실습 자료를 이메일로 보내드리겠습니다.<br><br>
        다음 월요일에 만나요! &#128075;
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('reviewForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = form.name.value.trim();
      const email = form.email.value.trim();
      const rating = form.rating?.value;
      const comment = form.comment.value.trim();

      if (!name || !email || !rating || !comment) {
        alert('이름, 이메일, 별점, 한줄평은 필수입니다.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '제출 중...';

      const reviewData = {
        mode: 'review',
        name,
        email,
        rating: Number(rating),
        comment,
        bestPart: form.bestPart?.value || '',
        improvement: form.improvement?.value.trim() || '',
        recommend: form.recommend?.value || '',
        submittedAt: new Date().toISOString(),
      };

      try {
        // ── Google Apps Script 연동 (배포 후 실제 URL로 교체) ──
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxXxJX26_mWoGUYYmh-9SwmzPH3A41rtVm4IMylyHZ6aIOSiXK6-O5ZXDQKFAQC5lMa4g/exec';
        const IS_DEMO = GAS_URL.includes('AKfycbxXxJX26_mWoGUYYmh');

        if (IS_DEMO) {
          console.log('데모 모드 - 후기 데이터:', reviewData);
          await new Promise(resolve => setTimeout(resolve, 800));
        } else {
          await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(reviewData),
          });
        }

        // Show success
        document.getElementById('formView').classList.add('hidden');
        document.getElementById('successView').classList.add('active');

      } catch (error) {
        console.error('제출 오류:', error);
        alert('제출 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
        submitBtn.disabled = false;
        submitBtn.textContent = '후기 제출하기';
      }
    });
  </script>
</body>
</html>
